<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#02010a">
<title>BOSS RUSH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#02010a;--bg2:#07051a;--accent:#ff3d00;--gold:#ffd600;--cyan:#00e5ff;--green:#76ff03;--white:#f0eeff;--hpP:#76ff03;--hpB:#ff1744;}
html{height:100%;background:var(--bg)}
body{width:100%;height:100dvh;background:var(--bg);color:var(--white);font-family:'Share Tech Mono',monospace;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:9999;}
#app{display:flex;flex-direction:column;width:100%;height:100dvh;align-items:stretch;position:relative;}
#hud{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top,0px));background:rgba(2,1,10,0.95);border-bottom:1px solid rgba(255,61,0,0.2);position:relative;z-index:10;}
.hud-block{display:flex;flex-direction:column;gap:3px;flex:1}
.hud-label{font-size:8px;letter-spacing:2px;opacity:.5;text-transform:uppercase}
.hp-wrap{height:10px;background:rgba(255,255,255,0.07);border-radius:1px;overflow:hidden;position:relative}
.hp-bar{height:100%;border-radius:1px;transition:width .15s ease;}
.hp-bar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.2)}
#phb{background:var(--hpP);box-shadow:0 0 8px var(--hpP)}
#bhb{background:var(--hpB);box-shadow:0 0 8px var(--hpB)}
.hud-val{font-family:'Teko',sans-serif;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
#bname{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-align:center;color:var(--accent);text-shadow:0 0 12px var(--accent);flex:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sep{width:1px;height:36px;background:rgba(255,255,255,0.08)}
#ga{flex:1;position:relative;overflow:hidden;background:var(--bg2)}
canvas{display:block;width:100%;height:100%}
#flash{position:absolute;inset:0;pointer-events:none;z-index:80;opacity:0;transition:opacity .05s}
#warn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Teko',sans-serif;font-size:44px;font-weight:700;letter-spacing:6px;color:var(--accent);text-shadow:0 0 20px var(--accent);pointer-events:none;z-index:60;opacity:0;text-align:center;}
#stel{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:20;pointer-events:none}
.sbadge{font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:2px;}
#controls{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));background:rgba(2,1,10,0.97);border-top:1px solid rgba(255,61,0,0.15);gap:12px;}
.dpad{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:4px;}
.gbtn{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:rgba(255,255,255,0.7);font-size:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:none;transition:all .08s;}
.gbtn.on,.gbtn:active{background:rgba(255,61,0,0.2);border-color:rgba(255,61,0,0.5);box-shadow:0 0 14px rgba(255,61,0,0.3);color:#fff;transform:scale(0.92)}
.gbtn.e{visibility:hidden}
.abtns{display:grid;grid-template-columns:repeat(2,64px);grid-template-rows:repeat(2,64px);gap:8px}
.abtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:none;transition:all .08s;font-size:10px;letter-spacing:1px;font-family:'Share Tech Mono',monospace;position:relative;overflow:hidden;}
.abtn .ai{font-size:20px;line-height:1}
.abtn.on,.abtn:active{transform:scale(0.9)}
#ba{border-color:rgba(255,61,0,0.6);background:rgba(255,61,0,0.12);color:var(--accent);grid-column:1;grid-row:2}
#ba.on,#ba:active{background:rgba(255,61,0,0.3);box-shadow:0 0 28px rgba(255,61,0,0.5)}
#bs{border-color:rgba(255,214,0,0.5);background:rgba(255,214,0,0.08);color:var(--gold);grid-column:2;grid-row:1}
#bs.on,#bs:active{background:rgba(255,214,0,0.25);box-shadow:0 0 28px rgba(255,214,0,0.4)}
#bd{border-color:rgba(0,229,255,0.4);background:rgba(0,229,255,0.07);color:var(--cyan);grid-column:2;grid-row:2}
#bd.on,#bd:active{background:rgba(0,229,255,0.2);box-shadow:0 0 20px rgba(0,229,255,0.35)}
.cdo{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);transition:height .1s linear;pointer-events:none;border-radius:0 0 50% 50%}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(2,1,10,0.95);backdrop-filter:blur(8px);z-index:100;gap:18px;padding:24px;transition:opacity .4s;}
.scr.h{opacity:0;pointer-events:none}
.stitle{font-family:'Teko',sans-serif;font-size:52px;font-weight:700;letter-spacing:8px;text-align:center;animation:gp 2s ease-in-out infinite}
@keyframes gp{0%,100%{text-shadow:0 0 12px currentColor,0 0 30px currentColor}50%{text-shadow:0 0 20px currentColor,0 0 60px currentColor,0 0 100px currentColor}}
.ssub{font-size:11px;letter-spacing:2.5px;color:rgba(255,255,255,0.35);text-align:center;line-height:2;white-space:pre-line}
.bprev{font-size:80px;line-height:1;animation:fl 3s ease-in-out infinite;filter:drop-shadow(0 0 20px currentColor)}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.bbtn{font-family:'Teko',sans-serif;font-size:20px;font-weight:600;letter-spacing:5px;padding:14px 40px;background:transparent;border:2px solid currentColor;cursor:pointer;border-radius:4px;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.bbtn:active{transform:scale(0.96);filter:brightness(1.3)}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:320px}
.rstat{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;border:1px solid rgba(255,255,255,0.08);border-radius:4px;background:rgba(255,255,255,0.03)}
.rl{font-size:8px;letter-spacing:2px;opacity:.4}
.rv{font-family:'Teko',sans-serif;font-size:26px;font-weight:700}
#bdots{display:flex;gap:6px;align-items:center}
.bdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);transition:all .3s}
.bdot.done{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px var(--gold)}
.bdot.cur{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent);animation:dp 1s ease-in-out infinite}
@keyframes dp{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.dnum{position:absolute;font-family:'Teko',sans-serif;font-weight:700;pointer-events:none;animation:df .9s ease-out forwards;z-index:50;white-space:nowrap}
@keyframes df{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px) scale(0.7);opacity:0}}
</style>
</head>
<body>
<div id="app">
<div id="hud">
  <div class="hud-block">
    <div class="hud-label">ГЕРОЙ</div>
    <div class="hp-wrap"><div class="hp-bar" id="phb" style="width:100%"></div></div>
    <div class="hud-val"><span id="phv">100</span><span style="opacity:.4;font-size:11px">/ <span id="phm">100</span></span></div>
  </div>
  <div class="sep"></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div id="bname">???</div>
    <div id="bdots"></div>
  </div>
  <div class="sep"></div>
  <div class="hud-block" style="align-items:flex-end">
    <div class="hud-label">БОСС</div>
    <div class="hp-wrap"><div class="hp-bar" id="bhb" style="width:100%"></div></div>
    <div class="hud-val" style="justify-content:flex-end;gap:6px"><span style="opacity:.4;font-size:11px">HP</span><span id="bhv">1000</span></div>
  </div>
</div>
<div id="ga">
  <canvas id="gc"></canvas>
  <div id="flash"></div>
  <div id="warn"></div>
  <div id="stel"></div>
</div>
<div id="controls">
  <div class="dpad">
    <div class="gbtn e"></div><div class="gbtn" id="du">▲</div><div class="gbtn e"></div>
    <div class="gbtn" id="dl">◄</div><div class="gbtn e"></div><div class="gbtn" id="dr">►</div>
    <div class="gbtn e"></div><div class="gbtn" id="dd">▼</div><div class="gbtn e"></div>
  </div>
  <div class="abtns">
    <div class="gbtn e"></div>
    <div class="abtn" id="bs"><div class="ai">✦</div><div>СПЕЦ</div><div class="cdo" id="cds" style="height:0%"></div></div>
    <div class="abtn" id="ba"><div class="ai">⚔</div><div>УДАР</div></div>
    <div class="abtn" id="bd"><div class="ai">💨</div><div>УКЛОН</div><div class="cdo" id="cdd" style="height:0%"></div></div>
  </div>
</div>
<div class="scr" id="s-intro">
  <div class="stitle" style="color:var(--accent)">BOSS<br>RUSH</div>
  <div class="ssub">10 БОССОВ · 10 ИСПЫТАНИЙ\nУНИЧТОЖЬ ИХ ВСЕХ</div>
  <div class="bprev" style="color:var(--accent)">💀</div>
  <div class="ssub" style="font-size:10px">⚔ УДАР — атака · ✦ СПЕЦ — тройной выстрел\n💨 УКЛОН — уйти от урона · D-pad — движение</div>
  <button class="bbtn" id="bstart" style="color:var(--accent)">[ НАЧАТЬ ]</button>
</div>
<div class="scr h" id="s-bi">
  <div style="font-family:'Teko',sans-serif;font-size:14px;letter-spacing:4px;opacity:.4">БОСС <span id="binum">1</span> / 10</div>
  <div class="bprev" id="biemoji">💀</div>
  <div class="stitle" id="biname" style="font-size:38px">???</div>
  <div class="ssub" id="bidesc"></div>
  <button class="bbtn" id="bfight" style="color:var(--accent)">[ В БОЙ ]</button>
</div>
<div class="scr h" id="s-win">
  <div class="stitle" style="color:var(--gold)">ПОБЕДА!</div>
  <div class="bprev" style="color:var(--gold)">🏆</div>
  <div class="rgrid" id="wstats"></div>
  <button class="bbtn" id="bwinr" style="color:var(--gold)">[ СНОВА ]</button>
</div>
<div class="scr h" id="s-lose">
  <div class="stitle" style="color:var(--hpB)">СМЕРТЬ</div>
  <div class="bprev" id="loseemoji" style="color:var(--hpB)">💀</div>
  <div class="ssub" id="losetxt"></div>
  <div class="rgrid" id="lstats"></div>
  <button class="bbtn" id="bretry" style="color:var(--hpB)">[ RETRY ]</button>
  <button class="bbtn" id="brestart" style="color:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.15);font-size:14px;padding:8px 24px">с начала</button>
</div>
</div>
<script>
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d'),ga=document.getElementById('ga');
const flashEl=document.getElementById('flash'),warnEl=document.getElementById('warn'),stEl=document.getElementById('stel');
let W,H;
function resize(){const r=ga.getBoundingClientRect();W=canvas.width=r.width;H=canvas.height=r.height;}
resize();window.addEventListener('resize',resize);

const BOSSES=[
  {id:0,name:"ТЕНЬ",emoji:"👁️",col:"#9c27b0",hp:300,p2hp:150,desc:"Призрак из тьмы\nАтакует теневыми снарядами",atks:["shadow_bolt","shadow_bolt","shadow_wave"],spec:"blink",bg:"#0a0015",atkI:2.2},
  {id:1,name:"ПЛАМЯ",emoji:"🔥",col:"#ff5722",hp:400,p2hp:200,desc:"Дух огня\nОжигает всё вокруг",atks:["fireball","fireball","fire_ring"],spec:"inferno",bg:"#180500",atkI:2.1},
  {id:2,name:"БУРЯ",emoji:"⚡",col:"#ffeb3b",hp:450,p2hp:225,desc:"Повелитель молний\nМолниеносные атаки",atks:["lightning","lightning","thunder_storm"],spec:"chain_lightning",bg:"#0f0f00",atkI:1.9},
  {id:3,name:"ЛЕДНИК",emoji:"❄️",col:"#00bcd4",hp:500,p2hp:250,desc:"Вечный холод\nЗамораживает и дробит",atks:["ice_shard","ice_shard","blizzard"],spec:"freeze",bg:"#001520",atkI:1.9},
  {id:4,name:"ЗЕМЛЯ",emoji:"🪨",col:"#8d6e63",hp:600,p2hp:300,desc:"Древний камень\nОт его ударов дрожит земля",atks:["rock_throw","shockwave","rock_barrage"],spec:"earthquake",bg:"#0d0800",atkI:1.8},
  {id:5,name:"ЯД",emoji:"☠️",col:"#76ff03",hp:550,p2hp:275,desc:"Мастер токсинов\nОтравляет и разлагает",atks:["poison_bolt","poison_bolt","toxic_cloud"],spec:"plague",bg:"#010d00",atkI:1.8},
  {id:6,name:"ВИХРЬ",emoji:"🌪️",col:"#b2dfdb",hp:650,p2hp:325,desc:"Ветер разрушения\nАтакует со всех сторон",atks:["wind_slash","wind_slash","tornado"],spec:"cyclone",bg:"#050a0b",atkI:1.6},
  {id:7,name:"НЕКРОС",emoji:"💀",col:"#e91e63",hp:700,p2hp:350,desc:"Повелитель смерти\nПоднимает орды нежити",atks:["death_ray","summon","death_nova"],spec:"army",bg:"#0d0005",atkI:1.6},
  {id:8,name:"ХАОС",emoji:"🌀",col:"#ff4081",hp:800,p2hp:400,desc:"Разрушитель миров\nАтаки непредсказуемы",atks:["chaos_bolt","chaos_bolt","chaos_burst","void_rift"],spec:"chaos_storm",bg:"#0a000a",atkI:1.4},
  {id:9,name:"АПОКАЛИПСИС",emoji:"☄️",col:"#ff6d00",hp:1000,p2hp:500,desc:"ФИНАЛЬНЫЙ БОСС\nКонец всего сущего",atks:["meteor","beam","meteor","explosion","beam"],spec:"armageddon",bg:"#0a0500",atkI:1.2},
];

let GS={screen:'intro',bossIdx:0,php:100,maxPhp:100,bhp:0,maxBhp:0};
let particles=[],projs=[],bprojs=[];
let BA={x:0,y:0,shake:0,enraged:false,p2:false};
let PA={x:0,y:0,inv:0,dodge:0,ddir:{x:1,y:0}};
let inp={dx:0,dy:0};
let cdA=0,cdS=0,cdD=0,atkT=0,atkI=2,specT=0;
let warnT=0,totalDmg=0,bossesKilled=0,runT=0;
let statFx=[];
let atkIdx=0; // sequential attack rotation index
let bossAlive=false; // guard for delayed damage

function initGame(){
  GS={screen:'intro',bossIdx:0,php:100,maxPhp:100,bhp:0,maxBhp:0};
  particles=[];projs=[];bprojs=[];
  BA={x:0,y:0,shake:0,enraged:false,p2:false};
  PA={x:0,y:0,inv:0,dodge:0,ddir:{x:1,y:0}};
  inp={dx:0,dy:0};cdA=0;cdS=0;cdD=0;atkT=0;atkI=2;specT=7;
  warnT=0;totalDmg=0;bossesKilled=0;runT=performance.now();statFx=[];
  atkIdx=0;bossAlive=false;
}

function startBoss(idx){
  const b=BOSSES[idx];
  GS.bossIdx=idx;GS.bhp=b.hp;GS.maxBhp=b.hp;
  atkT=1.5;atkI=b.atkI;specT=7;
  BA.x=W/2;BA.y=H*0.22;BA.shake=0;BA.enraged=false;BA.p2=false;
  PA.x=W/2;PA.y=H*0.72;PA.inv=0;PA.dodge=0;
  projs=[];bprojs=[];statFx=[];
  atkIdx=0;bossAlive=true;
  updHUD();updDots();
}

function updHUD(){
  const pp=Math.max(0,GS.php/GS.maxPhp*100);
  document.getElementById('phb').style.width=pp+'%';
  document.getElementById('phv').textContent=Math.ceil(GS.php);
  document.getElementById('phm').textContent=GS.maxPhp;
  const bp=Math.max(0,GS.bhp/GS.maxBhp*100);
  document.getElementById('bhb').style.width=bp+'%';
  document.getElementById('bhv').textContent=Math.ceil(GS.bhp);
  const b=BOSSES[GS.bossIdx];
  document.getElementById('bname').textContent=b.name;
  document.getElementById('bname').style.color=b.col;
}
function updDots(){
  const c=document.getElementById('bdots');c.innerHTML='';
  for(let i=0;i<10;i++){const d=document.createElement('div');d.className='bdot'+(i<GS.bossIdx?' done':i===GS.bossIdx?' cur':'');c.appendChild(d);}
}

function showScr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.add('h'));document.getElementById(id).classList.remove('h');}
function hideScrs(){document.querySelectorAll('.scr').forEach(s=>s.classList.add('h'));}
function showBI(idx){
  const b=BOSSES[idx];
  document.getElementById('binum').textContent=idx+1;
  document.getElementById('biemoji').textContent=b.emoji;document.getElementById('biemoji').style.color=b.col;
  document.getElementById('biname').textContent=b.name;document.getElementById('biname').style.color=b.col;
  document.getElementById('bidesc').textContent=b.desc;showScr('s-bi');
}

function spP(x,y,vx,vy,col,size,life){particles.push({x,y,vx,vy,col,size,life,ml:life});}
function burst(x,y,col,n,sp,sz){n=n||14;sp=sp||4;sz=sz||4;for(let i=0;i<n;i++){const a=Math.PI*2*i/n+Math.random()*0.4,s=sp*0.5+Math.random()*sp;spP(x,y,Math.cos(a)*s,Math.sin(a)*s,col,sz*(0.5+Math.random()),0.6+Math.random()*0.5);}}
function spBP(x,y,vx,vy,col,sz,dmg,tp){bprojs.push({x,y,vx,vy,col,sz:sz||10,dmg:dmg||10,tp:tp||'n',age:0});}
function spPP(x,y,vx,vy,dmg,col,sz){projs.push({x,y,vx,vy,dmg:dmg||15,col:col||'#ff3d00',sz:sz||9,age:0});}

function bossAtk(name){
  if(!bossAlive) return;
  const b=BOSSES[GS.bossIdx];
  const bx=BA.x,by=BA.y,px=PA.x,py=PA.y;
  const dx=px-bx,dy=py-by,dist=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=dx/dist,ny=dy/dist;
  const spd=2.5+GS.bossIdx*0.17+(BA.enraged?0.8:0);
  switch(name){
    case 'shadow_bolt': for(let i=-1;i<=1;i++){const a=Math.atan2(ny,nx)+i*0.25;spBP(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,b.col,10,12);} break;
    case 'shadow_wave': for(let i=0;i<8;i++){const a=Math.PI*2*i/8;spBP(bx,by,Math.cos(a)*spd*0.8,Math.sin(a)*spd*0.8,b.col,9,10);} break;
    case 'fireball': spBP(bx,by,nx*(spd+1),ny*(spd+1),b.col,14,16,'fire'); break;
    case 'fire_ring': for(let i=0;i<12;i++){const a=Math.PI*2*i/12;spBP(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,b.col,10,11,'fire');} break;
    case 'lightning':
      // Telegraph: warning + delayed big projectile
      warn('⚡');
      setTimeout(()=>{if(!bossAlive)return;spBP(bx,by,nx*(spd+1.5),ny*(spd+1.5),b.col,16,20);for(let i=0;i<4;i++) spP(bx+nx*i*22,by+ny*i*22,(Math.random()-.5)*3,(Math.random()-.5)*3,b.col,6,0.4);},350);
      break;
    case 'thunder_storm':
      warn('⛈');
      for(let i=0;i<5;i++) setTimeout(()=>{
        if(!bossAlive) return;
        const tx=PA.x+(Math.random()-.5)*120,ty=PA.y+(Math.random()-.5)*60;
        burst(tx,ty,b.col,10,5);
        spBP(tx-5,H*0.1,(Math.random()-.5)*0.3,spd*0.6+1,b.col,12,13);
      },300+i*250);
      break;
    case 'ice_shard': for(let i=-2;i<=2;i++){const a=Math.atan2(ny,nx)+i*0.2;spBP(bx,by,Math.cos(a)*(spd+0.5),Math.sin(a)*(spd+0.5),b.col,8,11,'ice');} break;
    case 'blizzard': for(let i=0;i<16;i++){const a=Math.PI*2*i/16;spBP(bx,by,Math.cos(a)*spd*0.7,Math.sin(a)*spd*0.7,b.col,7,8,'ice');}addSt('slow','❄️ ЗАМЕДЛЕН',b.col,2.5); break;
    case 'rock_throw': spBP(bx,by,nx*(spd*0.9),ny*(spd*0.9),b.col,18,22,'rock'); break;
    case 'shockwave': for(let i=0;i<6;i++){const a=Math.PI*2*i/6;spBP(bx,by,Math.cos(a)*spd*1.3,Math.sin(a)*spd*1.3,b.col,12,14);} break;
    case 'rock_barrage': for(let j=0;j<4;j++) setTimeout(()=>{if(!bossAlive)return;spBP(bx,by,nx*(spd+Math.random()),ny*(spd+Math.random()),b.col,14,14,'rock');},j*200); break;
    case 'poison_bolt': spBP(bx,by,nx*spd,ny*spd,b.col,11,11,'poison'); break;
    case 'toxic_cloud': for(let i=0;i<10;i++){const a=Math.PI*2*i/10;spBP(bx,by,Math.cos(a)*spd*0.6,Math.sin(a)*spd*0.6,b.col,13,9,'poison');} break;
    case 'wind_slash': for(let i=-1;i<=1;i++){const a=Math.atan2(ny,nx)+i*0.3;spBP(bx,by,Math.cos(a)*(spd+2.5),Math.sin(a)*(spd+2.5),b.col,8,11,'wind');} break;
    case 'tornado': for(let i=0;i<20;i++) setTimeout(()=>{if(!bossAlive)return;const a=Math.PI*2*i/20;spBP(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,b.col,9,9,'wind');},i*60); break;
    case 'death_ray':
      // Telegraph then fast beam projectile
      warn('💀 ЛУЧ');
      setTimeout(()=>{
        if(!bossAlive) return;
        // Fast wide beam
        for(let i=-1;i<=1;i++){const a=Math.atan2(ny,nx)+i*0.12;spBP(bx,by,Math.cos(a)*(spd+2),Math.sin(a)*(spd+2),b.col,14,24);}
        for(let i=0;i<6;i++) spP(bx+nx*i*18,by+ny*i*18,(Math.random()-.5)*4,(Math.random()-.5)*4,b.col,7,0.5);
      },500);
      break;
    case 'summon': for(let i=0;i<3;i++){const sx=bx+(Math.random()-.5)*120,sy=by+60+Math.random()*60;spBP(sx,sy,(PA.x-sx)/120,(PA.y-sy)/120,b.col,13,11,'minion');} break;
    case 'death_nova': for(let i=0;i<18;i++){const a=Math.PI*2*i/18;spBP(bx,by,Math.cos(a)*(spd+1),Math.sin(a)*(spd+1),b.col,10,13);} break;
    case 'chaos_bolt': for(let i=0;i<4;i++){const a=Math.random()*Math.PI*2;spBP(bx,by,Math.cos(a)*(spd+Math.random()*2),Math.sin(a)*(spd+Math.random()*2),b.col,10+Math.random()*5,12);} break;
    case 'chaos_burst': for(let i=0;i<24;i++){const a=Math.PI*2*i/24;spBP(bx,by,Math.cos(a)*spd*(0.7+Math.random()),Math.sin(a)*spd*(0.7+Math.random()),b.col,8,10);} break;
    case 'void_rift':
      warn('🌀 РАЗРЫВ');
      for(let i=0;i<8;i++){const a=Math.PI*2*i/8;spBP(bx,by,Math.cos(a)*(spd+1),Math.sin(a)*(spd+1),b.col,11,12);}
      addSt('void','🌀 РАЗРЫВ',b.col,2);
      break;
    case 'meteor':
      warn('☄️');
      for(let i=0;i<3;i++) setTimeout(()=>{
        if(!bossAlive) return;
        const tx=PA.x+(Math.random()-.5)*150;
        // Big slow falling rock from top
        spBP(tx,10,(Math.random()-.5)*0.3,spd*0.55+0.5,b.col,20,22,'rock');
        burst(tx,20,b.col,8,4);
      },i*400);
      break;
    case 'beam':
      warn('🔥 ЛУЧ');
      setTimeout(()=>{
        if(!bossAlive) return;
        for(let i=-2;i<=2;i++){const a=Math.atan2(ny,nx)+i*0.1;spBP(bx,by,Math.cos(a)*(spd+2.5),Math.sin(a)*(spd+2.5),b.col,13,18);}
      },500);
      break;
    case 'explosion':
      burst(bx,by,b.col,28,7,10);
      for(let i=0;i<14;i++){const a=Math.PI*2*i/14;spBP(bx,by,Math.cos(a)*(spd+1.5),Math.sin(a)*(spd+1.5),b.col,12,15,'fire');}
      break;
  }
}

function bossSpec(name){
  if(!bossAlive) return;
  const b=BOSSES[GS.bossIdx];warn('СПЕЦ!');flash(b.col+'55');BA.shake=0.5;
  switch(name){
    case 'blink': BA.x=W*0.2+Math.random()*W*0.6;BA.y=H*0.12+Math.random()*H*0.22;for(let i=0;i<3;i++) bossAtk('shadow_bolt'); break;
    case 'inferno': for(let r=0;r<3;r++) setTimeout(()=>{if(!bossAlive)return;for(let i=0;i<16;i++){const a=Math.PI*2*i/16;spBP(BA.x,BA.y,Math.cos(a)*(2.5+r*0.5),Math.sin(a)*(2.5+r*0.5),b.col,10,12,'fire');}},r*200); break;
    case 'chain_lightning':
      warn('⚡ ЦЕПЬ');
      for(let i=0;i<4;i++) setTimeout(()=>{if(!bossAlive)return;const a=Math.random()*Math.PI*2;spBP(BA.x,BA.y,Math.cos(a)*(3+i*0.3),Math.sin(a)*(3+i*0.3),b.col,13,14);},i*200);
      break;
    case 'freeze': addSt('frozen','❄️ ЗАМОРОЖЕН',b.col,3.0);for(let i=0;i<6;i++) setTimeout(()=>{if(!bossAlive)return;bossAtk('ice_shard');},i*150); break;
    case 'earthquake': warn('ЗЕМЛЕТРЯС!');for(let i=0;i<7;i++) setTimeout(()=>{if(!bossAlive)return;BA.shake=0.3;for(let j=0;j<6;j++){const a=Math.PI*2*j/6;spBP(W/2,H*0.72,Math.cos(a)*2.5,Math.sin(a)*2.5,b.col,14,12,'rock');}},i*200); break;
    case 'plague': addSt('poison','☠️ ЯД',b.col,6);for(let i=0;i<20;i++){const a=Math.PI*2*i/20;spBP(BA.x,BA.y,Math.cos(a)*2.5,Math.sin(a)*2.5,b.col,11,8,'poison');} break;
    case 'cyclone': warn('ЦИКЛОН!');for(let i=0;i<28;i++) setTimeout(()=>{if(!bossAlive)return;const a=Math.PI*2*i/28;spBP(W/2,H/2,Math.cos(a)*3.5,Math.sin(a)*3.5,b.col,9,10,'wind');},i*40); break;
    case 'army': warn('АРМИЯ!');for(let i=0;i<6;i++){const sx=Math.random()*W,sy=BA.y+50+Math.random()*80;spBP(sx,sy,(PA.x-sx)/140,(PA.y-sy)/140,b.col,13,11,'minion');} break;
    case 'chaos_storm': warn('ХАОС!');for(let i=0;i<40;i++) setTimeout(()=>{if(!bossAlive)return;const a=Math.random()*Math.PI*2;spBP(BA.x,BA.y,Math.cos(a)*(2+Math.random()*3),Math.sin(a)*(2+Math.random()*3),b.col,8+Math.random()*8,10);},i*40); break;
    case 'armageddon':
      warn('АРМАГЕДДОН!');flash('#ff6d0080');
      for(let i=0;i<30;i++) setTimeout(()=>{
        if(!bossAlive) return;
        const tx=Math.random()*W;
        spBP(tx,5,(Math.random()-.5)*0.5,3+Math.random()*2,b.col,16,16,'rock');
        burst(tx,15,b.col,5,4);
      },i*120);
      break;
  }
}

function addSt(type,label,col,dur){statFx=statFx.filter(s=>s.type!==type);statFx.push({type,label,col,dur});renderSt();}
function renderSt(){stEl.innerHTML='';for(const s of statFx){const d=document.createElement('div');d.className='sbadge';d.textContent=s.label;d.style.background=s.col+'33';d.style.border=`1px solid ${s.col}66`;d.style.color=s.col;stEl.appendChild(d);}}
function tickSt(dt){statFx=statFx.filter(s=>{s.dur-=dt;return s.dur>0;});if(statFx.find(s=>s.type==='poison')) dealPDmg(3*dt,'☠️',true);renderSt();}
function hasSt(t){return statFx.some(s=>s.type===t)}

function dealPDmg(dmg,icon,silent){
  if(PA.inv>0||PA.dodge>0) return;
  GS.php=Math.max(0,GS.php-dmg);PA.inv=0.4;updHUD();
  if(!silent){flash('#ff000025');floatDmg('-'+Math.ceil(dmg),PA.x,PA.y-20,'#ff1744');burst(PA.x,PA.y,'#ff1744',7,3,4);}
  if(GS.php<=0) onDie();
}
function dealBDmg(dmg){
  const crit=Math.random()<0.2,d=dmg*(crit?1.5:1);
  GS.bhp=Math.max(0,GS.bhp-d);totalDmg+=d;updHUD();BA.shake=0.15;
  floatDmg((crit?'💥':'')+Math.ceil(d),BA.x+(Math.random()-.5)*40,BA.y-30,crit?'#ffd600':'#ff3d00');
  burst(BA.x,BA.y,BOSSES[GS.bossIdx].col,6,3,4);
  const b=BOSSES[GS.bossIdx];
  if(!BA.p2&&GS.bhp<=b.p2hp){BA.p2=true;BA.enraged=true;atkI=Math.max(0.6,atkI*0.65);warn('ЯРОСТЬ!');flash(b.col+'80');BA.shake=0.7;burst(BA.x,BA.y,b.col,30,7,8);}
  if(GS.bhp<=0) onBossKill();
}

function onBossKill(){
  bossAlive=false;
  const b=BOSSES[GS.bossIdx];bossesKilled++;burst(BA.x,BA.y,b.col,40,8,10);flash(b.col+'60');bprojs=[];
  GS.php=Math.min(GS.maxPhp,GS.php+25);updHUD();
  if(GS.bossIdx>=9){setTimeout(showWin,900);return;}
  setTimeout(()=>{GS.bossIdx++;showBI(GS.bossIdx);},700);
}
function onDie(){
  bossAlive=false;
  const b=BOSSES[GS.bossIdx];
  document.getElementById('loseemoji').textContent=b.emoji;document.getElementById('loseemoji').style.color=b.col;
  document.getElementById('losetxt').textContent='Убит боссом: '+b.name;
  document.getElementById('lstats').innerHTML=mkStats([{l:'БОССЫ',v:bossesKilled,c:'var(--gold)'},{l:'УРОН',v:Math.round(totalDmg),c:'var(--accent)'},{l:'HP',v:Math.ceil(GS.php)+'/'+GS.maxPhp,c:'var(--hpP)'}]);
  showScr('s-lose');
}
function showWin(){
  const t=Math.floor((performance.now()-runT)/1000);
  document.getElementById('wstats').innerHTML=mkStats([{l:'ВРЕМЯ',v:fmt(t),c:'var(--gold)'},{l:'УРОН',v:Math.round(totalDmg),c:'var(--accent)'},{l:'БОССЫ',v:'10/10',c:'var(--green)'}]);
  showScr('s-win');
}
function mkStats(arr){return arr.map(s=>`<div class="rstat"><div class="rl">${s.l}</div><div class="rv" style="color:${s.c}">${s.v}</div></div>`).join('')}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function doAtk(){
  if(cdA>0||GS.screen!=='game') return;
  const bx=BA.x,by=BA.y,dx=bx-PA.x,dy=by-PA.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
  // Always fire toward boss (no distance limit)
  spPP(PA.x,PA.y,dx/dist*5.5,dy/dist*5.5,15+Math.random()*10);
  burst(PA.x,PA.y,'#ff3d00',6,3,3);
  cdA=0.28;
}
function doSpec(){
  if(cdS>0||GS.screen!=='game') return;
  const bx=BA.x,by=BA.y,dx=bx-PA.x,dy=by-PA.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
  for(let i=-1;i<=1;i++){const a=Math.atan2(dy,dx)+i*0.38;spPP(PA.x,PA.y,Math.cos(a)*6.5,Math.sin(a)*6.5,28,'#ffd600',11);}
  burst(PA.x,PA.y,'#ffd600',10,5,5);cdS=4.0;
}
function doDodge(){
  if(cdD>0||PA.dodge>0||GS.screen!=='game') return;
  PA.ddir={x:inp.dx||(Math.random()>.5?1:-1),y:inp.dy||0};
  PA.dodge=0.32;burst(PA.x,PA.y,'#00e5ff',8,4,3);cdD=2.5;
}

function collide(){
  const bs=32*(0.9+GS.bossIdx*0.08+(BA.p2?0.15:0));
  projs=projs.filter(p=>{const dx=p.x-BA.x,dy=p.y-BA.y,hit=Math.sqrt(dx*dx+dy*dy)<(p.sz+bs*0.5);if(hit){dealBDmg(p.dmg);burst(p.x,p.y,p.col,8,3,4);}return !hit;});
  if(PA.inv<=0&&PA.dodge<=0){
    bprojs=bprojs.filter(p=>{
      const dx=p.x-PA.x,dy=p.y-PA.y,hit=Math.sqrt(dx*dx+dy*dy)<(p.sz+14);
      if(hit){dealPDmg(p.dmg,'💥');if(p.tp==='poison') addSt('poison','☠️ ЯД',BOSSES[GS.bossIdx].col,4);if(p.tp==='ice') addSt('slow','❄️ ЗАМЕДЛЕН',BOSSES[GS.bossIdx].col,2);burst(p.x,p.y,p.col,8,3,4);}
      return !hit;
    });
  }
}

function flash(col){flashEl.style.background=col||'#ff000050';flashEl.style.opacity='1';setTimeout(()=>flashEl.style.opacity='0',80);}
function warn(txt){warnEl.textContent=txt;warnEl.style.opacity='1';warnT=0.85;}
function floatDmg(txt,x,y,col){
  const el=document.createElement('div');el.className='dnum';el.textContent=txt;
  el.style.color=col||'#ff3d00';el.style.fontSize=txt.length>5?'17px':'23px';el.style.textShadow=`0 0 8px ${col}`;
  el.style.left=Math.max(8,Math.min(W-60,x-18))+'px';el.style.top=Math.max(8,y-28)+'px';
  ga.appendChild(el);setTimeout(()=>el.remove(),920);
}

function update(dt){
  if(GS.screen!=='game') return;
  const spd=hasSt('slow')?1.8:3.2,frozen=hasSt('frozen')?0:1;
  PA.x+=inp.dx*spd*frozen;PA.y+=inp.dy*spd*frozen;
  if(PA.dodge>0){PA.x+=PA.ddir.x*10;PA.y+=PA.ddir.y*9;PA.dodge-=dt;}
  PA.x=Math.max(18,Math.min(W-18,PA.x));PA.y=Math.max(H*0.46,Math.min(H-55,PA.y));
  if(PA.inv>0) PA.inv-=dt;
  if(cdA>0) cdA-=dt;if(cdS>0) cdS=Math.max(0,cdS-dt);if(cdD>0) cdD=Math.max(0,cdD-dt);
  if(warnT>0){warnT-=dt;if(warnT<=0) warnEl.style.opacity='0';}
  tickSt(dt);

  const t=performance.now()/1000,en=BA.enraged;
  BA.x+=Math.sin(t*0.65)*(en?1.0:0.6);BA.y+=Math.sin(t*0.5+1)*0.35;
  BA.x+=(W/2-BA.x)*0.002;BA.x=Math.max(W*0.15,Math.min(W*0.85,BA.x));BA.y=Math.max(H*0.08,Math.min(H*0.4,BA.y));

  atkT-=dt;if(atkT<=0){
    const b=BOSSES[GS.bossIdx];
    // Sequential rotation through attacks
    const atk=b.atks[atkIdx % b.atks.length];
    atkIdx++;
    bossAtk(atk);
    atkT=atkI*(en?0.72:1)*(0.85+Math.random()*0.3);
  }
  specT-=dt;if(specT<=0){bossSpec(BOSSES[GS.bossIdx].spec);specT=8*(en?0.8:1);}

  projs=projs.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.age+=dt;return p.x>-20&&p.x<W+20&&p.y>-20&&p.y<H+20&&p.age<2.5;});
  bprojs=bprojs.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.age+=dt;if(p.x<0||p.x>W) p.vx*=-1;if(p.y<0||p.y>H) p.vy*=-1;return p.age<5;});
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.023;p.size*=0.97;return p.life>0&&p.size>0.3;});
  collide();
  document.getElementById('cds').style.height=(cdS/4*100)+'%';
  document.getElementById('cdd').style.height=(cdD/2.5*100)+'%';
}

function render(){
  if(GS.screen!=='game') return;
  const b=BOSSES[GS.bossIdx];
  ctx.fillStyle=b.bg||'#07051a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=b.col+'10';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const vg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.65)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  for(const p of particles){
    const a=p.life/p.ml*0.9;
    ctx.fillStyle=p.col+(Math.round(a*255).toString(16).padStart(2,'0'));
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  for(const p of projs){
    const gd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz);
    gd.addColorStop(0,'rgba(255,255,255,.9)');gd.addColorStop(0.4,p.col+'cc');gd.addColorStop(1,p.col+'00');
    ctx.fillStyle=gd;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
  }
  for(const p of bprojs){
    const al=Math.min(1,p.age*3);ctx.save();ctx.globalAlpha=al;
    const gd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz*1.4);
    gd.addColorStop(0,'rgba(255,255,255,.95)');gd.addColorStop(0.35,p.col+'dd');gd.addColorStop(1,p.col+'00');
    ctx.fillStyle=gd;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*1.1,0,Math.PI*2);ctx.fill();
    if(p.tp==='fire'||p.tp==='ice'||p.tp==='minion'){
      ctx.font=`${p.sz*1.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.tp==='fire'?'🔥':p.tp==='ice'?'❄️':'💀',p.x,p.y);
    }
    ctx.restore();
  }

  {
    const t=performance.now()/1000,en=BA.enraged;
    let bx=BA.x,by=BA.y;
    if(BA.shake>0){bx+=(Math.random()-.5)*BA.shake*18;by+=(Math.random()-.5)*BA.shake*9;BA.shake=Math.max(0,BA.shake-0.02);}
    const bob=Math.sin(t*1.8)*6,sz=32*(0.9+GS.bossIdx*0.08+(BA.p2?0.15:0)),pulse=0.93+0.07*Math.sin(t*3);
    const ag=ctx.createRadialGradient(bx,by+bob,0,bx,by+bob,sz*2.8);
    ag.addColorStop(0,b.col+'45');ag.addColorStop(0.5,b.col+'18');ag.addColorStop(1,'transparent');
    ctx.fillStyle=ag;ctx.beginPath();ctx.arc(bx,by+bob,sz*2.8,0,Math.PI*2);ctx.fill();
    if(en) for(let r=0;r<3;r++){
      const rr=sz*(1.2+r*0.55)+Math.sin(t*4+r)*sz*0.14;
      const ah=Math.round((0.4-r*0.1)*255).toString(16).padStart(2,'0');
      ctx.strokeStyle=b.col+ah;ctx.lineWidth=2-r*0.4;ctx.beginPath();ctx.arc(bx,by+bob,rr,0,Math.PI*2);ctx.stroke();
    }
    ctx.save();ctx.translate(bx,by+bob);ctx.scale(pulse*(en?1.1:1),pulse*(en?1.1:1));
    ctx.font=`${sz*1.6}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=b.col;ctx.shadowBlur=en?35:18;ctx.fillText(b.emoji,0,0);ctx.shadowBlur=0;ctx.restore();
    const hp=GS.bhp/GS.maxBhp;
    ctx.strokeStyle=b.col+'55';ctx.lineWidth=3;ctx.beginPath();ctx.arc(bx,by+bob,sz*1.4,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=b.col;ctx.lineWidth=3;ctx.beginPath();ctx.arc(bx,by+bob,sz*1.4,-Math.PI/2,-Math.PI/2+Math.PI*2*hp);ctx.stroke();
  }

  {
    const px=PA.x,py=PA.y,t=performance.now()/1000,dg=PA.dodge>0,inv=PA.inv>0;
    if(inv&&Math.floor(t*12)%2===0) return;
    const pgd=ctx.createRadialGradient(px,py,0,px,py,32);
    pgd.addColorStop(0,dg?'rgba(0,229,255,.4)':'rgba(255,61,0,.3)');pgd.addColorStop(1,'transparent');
    ctx.fillStyle=pgd;ctx.fillRect(px-32,py-32,64,64);
    ctx.save();ctx.translate(px,py);ctx.font='38px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=dg?'#00e5ff':'#ff3d00';ctx.shadowBlur=14;ctx.fillText('🧙',0,0);ctx.shadowBlur=0;ctx.restore();
  }
}

let lastT=0;
function loop(ts){const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;update(dt);render();requestAnimationFrame(loop);}
requestAnimationFrame(ts=>{lastT=ts;loop(ts);});

setInterval(()=>{if(GS.screen==='game') doAtk();},280);

const K={};
document.addEventListener('keydown',e=>{K[e.key]=true;upK();if(e.key===' '||e.key==='z') doAtk();if(e.key==='x') doSpec();if(e.key==='c'||e.key==='Shift') doDodge();});
document.addEventListener('keyup',e=>{K[e.key]=false;upK();});
function upK(){inp.dx=(K['ArrowRight']||K['d']?1:0)-(K['ArrowLeft']||K['a']?1:0);inp.dy=(K['ArrowDown']||K['s']?1:0)-(K['ArrowUp']||K['w']?1:0);}

function sdp(id,dx,dy){
  const btn=document.getElementById(id);
  const on=()=>{inp.dx=dx;inp.dy=dy;btn.classList.add('on');};
  const off=()=>{if(inp.dx===dx&&inp.dy===dy){inp.dx=0;inp.dy=0;}btn.classList.remove('on');};
  btn.addEventListener('pointerdown',e=>{e.preventDefault();on();});
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>btn.addEventListener(ev,off));
}
sdp('du',0,-1);sdp('dd',0,1);sdp('dl',-1,0);sdp('dr',1,0);
function sab(id,fn){
  const btn=document.getElementById(id);
  btn.addEventListener('pointerdown',e=>{e.preventDefault();fn();btn.classList.add('on');});
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>btn.addEventListener(ev,()=>btn.classList.remove('on')));
}
sab('ba',doAtk);sab('bs',doSpec);sab('bd',doDodge);

document.getElementById('bstart').addEventListener('click',()=>{initGame();showBI(0);});
document.getElementById('bfight').addEventListener('click',()=>{startBoss(GS.bossIdx);hideScrs();GS.screen='game';});
document.getElementById('bretry').addEventListener('click',()=>{GS.php=Math.min(GS.maxPhp,GS.php+35);statFx=[];bossAlive=false;startBoss(GS.bossIdx);hideScrs();GS.screen='game';});
document.getElementById('brestart').addEventListener('click',()=>{initGame();showScr('s-intro');});
document.getElementById('bwinr').addEventListener('click',()=>{initGame();showScr('s-intro');});

initGame();
const dc=document.getElementById('bdots');dc.innerHTML='';
for(let i=0;i<10;i++){const d=document.createElement('div');d.className='bdot';dc.appendChild(d);}
showScr('s-intro');
</script>
